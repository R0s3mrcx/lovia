global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "lovia"
    environment: "local"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "lovia-app"
    static_configs:
      - targets: ["lovia-app:3000"]
    metrics_path: "/api/metrics"
    scrape_interval: 30s
