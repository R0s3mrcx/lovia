# ============================================================
# KUBERNETES - secrets.example.yml
# ============================================================
# Este archivo es un EJEMPLO. NUNCA subas secrets.yml real a Git.
#
# INSTRUCCIONES:
#   1. Copia este archivo: cp k8s/secrets.example.yml k8s/secrets.yml
#   2. Reemplaza los valores con tus credenciales en base64
#   3. Aplica: kubectl apply -f k8s/secrets.yml
#
# Para encodear en base64:
#   echo -n "tu-valor-real" | base64
#
# Para verificar que está bien:
#   kubectl get secret lovia-secrets -o jsonpath='{.data.supabase-url}' | base64 -d
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: lovia-secrets
  namespace: default
  labels:
    app: lovia
type: Opaque

data:
  # echo -n "https://TU-PROJECT-ID.supabase.co" | base64
  supabase-url: <BASE64_DE_TU_SUPABASE_URL>

  # echo -n "eyTU-CLAVE-ANONIMA-DE-SUPABASE" | base64
  supabase-anon-key: <BASE64_DE_TU_SUPABASE_ANON_KEY>